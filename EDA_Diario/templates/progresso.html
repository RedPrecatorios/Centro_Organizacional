{% extends "base.html" %}

{% block title %}Processando — {{ platform_title }}{% endblock %}

{% block content %}
<div class="max-w-3xl" x-data="progresso()" x-init="iniciar()">

  <div class="mb-8">
    <h1 class="text-2xl font-bold text-white">Processando...</h1>
    <p class="text-slate-400 mt-1 text-sm">Acompanhe o progresso em tempo real.</p>
  </div>

  <!-- Status card -->
  <div class="bg-slate-900 border border-white/5 rounded-2xl p-6 mb-6">
    <div class="flex items-center gap-4 mb-6">
      <!-- Spinner / check -->
      <div x-show="rodando" class="w-10 h-10 rounded-full border-2 border-indigo-500 border-t-transparent animate-spin flex-shrink-0"></div>
      <div x-show="!rodando && !erro" x-cloak class="w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <div x-show="!rodando && erro" x-cloak class="w-10 h-10 rounded-full bg-red-500 flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </div>

      <div>
        <p class="font-semibold text-white" x-text="rodando ? 'Executando Etapa ' + etapa + '...' : (erro ? 'Erro na execucao' : 'Concluido com sucesso!')"></p>
        <p class="text-slate-500 text-sm" x-text="rodando ? 'Nao feche esta janela.' : (erro ? 'Veja o log abaixo.' : 'Resultado disponivel para download.')"></p>
      </div>
    </div>

    <!-- Log terminal -->
    <div class="bg-slate-950 rounded-xl p-4 font-mono text-xs text-slate-300 h-72 overflow-y-auto border border-white/5" id="log-box">
      <template x-for="linha in log" :key="linha">
        <div class="leading-6"
             :class="linha.includes('[ERRO]') ? 'text-red-400' : (linha.includes('[OK]') ? 'text-emerald-400' : 'text-slate-400')"
             x-text="linha">
        </div>
      </template>
      <div x-show="rodando" class="flex items-center gap-2 text-indigo-400 mt-1">
        <span class="animate-pulse">&gt;</span>
        <span class="animate-pulse">aguardando...</span>
      </div>
    </div>
  </div>

  <!-- Botoes pos-execucao -->
  <div x-show="!rodando" x-cloak class="flex gap-3">
    <a href="{{ url_for('eda.index') }}"
       class="flex items-center gap-2 px-5 py-2.5 bg-slate-700 hover:bg-slate-600 text-white text-sm font-semibold rounded-xl transition-all">
      Voltar ao Painel
    </a>
    <a x-show="!erro" href="{{ url_for('eda.download', arquivo='final') }}"
       class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-semibold rounded-xl transition-all shadow shadow-emerald-500/30">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
      Baixar FINAL
    </a>
  </div>

</div>

<script>
function progresso() {
  return {
    rodando: true,
    erro: false,
    etapa: null,
    log: [],

    iniciar() {
      this.buscar();
    },

    async buscar() {
      try {
        const res  = await fetch({{ url_for('eda.api_status')|tojson }});
        const data = await res.json();
        this.rodando = data.rodando;
        this.etapa   = data.etapa;
        this.log     = data.log;
        this.erro    = data.log.some(l => l.includes('[ERRO]'));

        const box = document.getElementById('log-box');
        if (box) box.scrollTop = box.scrollHeight;

        if (this.rodando) {
          setTimeout(() => this.buscar(), 1000);
        }
      } catch (e) {
        setTimeout(() => this.buscar(), 2000);
      }
    }
  }
}
</script>
{% endblock %}
