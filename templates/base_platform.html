<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ platform_title }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/platform.css') }}" />
  {% block extra_css %}{% endblock %}
</head>
<body>

  <div class="platform-shell">
    <div class="platform-top">
      <div class="platform-brand">
        <div class="platform-mark">W</div>
        <div class="platform-title-wrap">
          <div class="platform-title">{{ platform_title }}</div>
          <div class="platform-sub">{{ platform_subtitle }}</div>
        </div>
      </div>
      <nav class="platform-tabs" aria-label="Módulos">
        <a href="{{ url_for('eda.index') }}"
           class="platform-tab{% if active_tab == 'planilhas' %} active{% endif %}"
           data-module="planilhas">
          <span class="tab-icon" aria-hidden="true">📊</span>
          Planilhas / EDA
        </a>
        <a href="{{ url_for('whatsapp_view') }}"
           class="platform-tab{% if active_tab == 'whatsapp' %} active{% endif %}"
           data-module="whatsapp">
          <span class="tab-icon" aria-hidden="true">💬</span>
          Conversas WhatsApp
        </a>
      </nav>
    </div>
    {% block module_toolbar %}{% endblock %}
  </div>

  <main class="workspace{% block workspace_class %}{% endblock %}">
    {% block workspace_content %}{% endblock %}
  </main>

  <div id="platform-toast"></div>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
